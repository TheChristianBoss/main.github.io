<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop — Christian Goblin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0d;
      --surface:  #161616;
      --border:   #2a2a2a;
      --text:     #e8e2d9;
      --muted:    #6b6560;
      --gold:     #c9a84c;
      --gold-dim: #8a6f2e;
      --red:      #8b1a1a;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,13,13,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      color: var(--gold);
      text-decoration: none;
    }

    .logo span { color: var(--text); font-weight: 700; }

    .cart-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }

    .cart-btn:hover { border-color: var(--gold); color: var(--gold); }

    .cart-count {
      background: var(--gold);
      color: #000;
      font-weight: 700;
      font-size: 11px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 80px 2rem 64px;
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(201,168,76,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-eyebrow {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
    }

    .hero h1 {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: clamp(2.2rem, 6vw, 4rem);
      line-height: 1.1;
      letter-spacing: 0.03em;
      margin-bottom: 16px;
    }

    .hero p {
      color: var(--muted);
      max-width: 480px;
      margin: 0 auto;
      font-size: 15px;
    }

    /* ── Grid ── */
    .shop-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 64px 2rem;
    }

    .section-label {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    /* ── Product Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: border-color 0.2s, transform 0.2s;
    }

    .card:hover {
      border-color: var(--gold-dim);
      transform: translateY(-2px);
    }

    .card-image {
      aspect-ratio: 1;
      overflow: hidden;
      background: #111;
      position: relative;
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .card:hover .card-image img { transform: scale(1.04); }

    .card-body {
      padding: 20px;
    }

    .card-name {
      font-family: 'Cinzel', serif;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .card-price {
      color: var(--gold);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .card-cta {
      display: block;
      margin-top: 16px;
      text-align: center;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 13px;
      letter-spacing: 0.05em;
      color: var(--muted);
      transition: border-color 0.2s, color 0.2s;
    }

    .card:hover .card-cta {
      border-color: var(--gold-dim);
      color: var(--gold);
    }

    /* ── States ── */
    .loading-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .skeleton {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .skeleton-img {
      aspect-ratio: 1;
      background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    .skeleton-body { padding: 20px; }

    .skeleton-line {
      height: 12px;
      border-radius: 4px;
      background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      margin-bottom: 10px;
    }

    .skeleton-line.short { width: 40%; }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .error-msg {
      text-align: center;
      padding: 80px 2rem;
      color: var(--muted);
    }

    .error-msg strong { display: block; color: var(--text); margin-bottom: 8px; font-size: 1.1rem; }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 40px 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--gold); }

    @media (max-width: 600px) {
      .hero { padding: 60px 1.5rem 48px; }
      .shop-section { padding: 48px 1.5rem; }
      header { padding: 0 1.5rem; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/"><span>Christian</span>Goblin</a>
  <a class="cart-btn" href="/store/cart.html">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/>
    </svg>
    Cart
    <span class="cart-count" id="cartCount">0</span>
  </a>
</header>

<section class="hero">
  <p class="hero-eyebrow">Official Merch</p>
  <h1>The Goblin<br>Collection</h1>
  <p>Wearable faith. Designed for the weird, the wandering, and the redeemed.</p>
</section>

<main class="shop-section">
  <p class="section-label">All Products</p>
  <div id="grid"></div>
</main>

<footer>
  <p>&copy; 2025 ChristianGoblin &nbsp;·&nbsp; <a href="mailto:hello@christiangoblin.com">Contact</a></p>
</footer>

<script>
  const WORKER = 'https://site.michaelthechristiangoblin.workers.dev';

  function esc(value) {
    return String(value ?? '').replace(/[&<>'"]/g, ch => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
    }[ch]));
  }

  function safeUrl(value) {
    try {
      const url = new URL(String(value || ''), window.location.origin);
      return url.protocol === 'https:' || url.origin === window.location.origin ? url.href : '';
    } catch { return ''; }
  }

  function money(value) {
    const n = Number.parseFloat(value);
    return Number.isFinite(n) ? n.toFixed(2) : '';
  }

  // ── Cart count ───────────────────────────────────────────────────────
  function getCart() {
    try { return JSON.parse(localStorage.getItem('cg_cart') || '[]'); } catch { return []; }
  }

  function updateCartCount() {
    const count = getCart().reduce((sum, i) => sum + (Number(i.quantity) || 0), 0);
    document.getElementById('cartCount').textContent = count;
  }

  updateCartCount();

  // ── Skeletons ────────────────────────────────────────────────────────
  function renderSkeletons(n = 3) {
    const grid = document.getElementById('grid');
    grid.className = 'loading-grid';
    grid.innerHTML = Array.from({ length: n }, () => `
      <div class="skeleton">
        <div class="skeleton-img"></div>
        <div class="skeleton-body">
          <div class="skeleton-line"></div>
          <div class="skeleton-line short"></div>
        </div>
      </div>
    `).join('');
  }

  // ── Render products ──────────────────────────────────────────────────
  function renderProducts(products) {
    const grid = document.getElementById('grid');
    grid.className = 'grid';

    if (!products.length) {
      grid.innerHTML = '<p class="error-msg"><strong>No products yet.</strong> Check back soon.</p>';
      return;
    }

    grid.innerHTML = products.map(p => {
      const price = money(p.price);
      return `
        <a class="card" href="/store/product.html?id=${encodeURIComponent(String(p.id || ''))}">
          <div class="card-image">
            <img src="${esc(safeUrl(p.thumbnail))}" alt="${esc(p.name)}" loading="lazy" />
          </div>
          <div class="card-body">
            <div class="card-name">${esc(p.name)}</div>
            ${price ? `<div class="card-price">From $${price}</div>` : ''}
            <span class="card-cta">View Product →</span>
          </div>
        </a>
      `;
    }).join('');
  }

  // ── Fetch ────────────────────────────────────────────────────────────
  async function loadProducts() {
    renderSkeletons(3);
    try {
      const res = await fetch(`${WORKER}/products`);
      const data = await res.json();
      if (!res.ok || !data.products) throw new Error(data.error || 'Bad response');
      renderProducts(data.products);
    } catch (err) {
      document.getElementById('grid').innerHTML = `
        <div class="error-msg">
          <strong>Couldn't load products.</strong>
          Check your connection and try again.<br><br>
          <button class="cart-btn" type="button" onclick="loadProducts()">Retry</button>
        </div>
      `;
    }
  }

  loadProducts();
</script>
</body>
</html>
