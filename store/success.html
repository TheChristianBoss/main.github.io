<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verifying Order — Christian Goblin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d; --surface: #161616; --border: #2a2a2a;
      --text: #e8e2d9; --muted: #6b6560; --gold: #c9a84c;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 15px;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem; height: 64px;
      display: flex; align-items: center;
    }
    .logo {
      font-family: 'Cinzel', serif; font-weight: 900;
      font-size: 1.1rem; letter-spacing: 0.08em;
      color: var(--gold); text-decoration: none;
    }
    .logo span { color: var(--text); font-weight: 700; }
    main {
      flex: 1; display: flex; align-items: center;
      justify-content: center; padding: 64px 2rem;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 48px 40px;
      max-width: 480px; width: 100%; text-align: center;
    }
    .check {
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(201,168,76,0.1); border: 1px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px; font-size: 1.8rem;
    }
    h1 {
      font-family: 'Cinzel', serif; font-weight: 900;
      font-size: 1.6rem; margin-bottom: 12px;
    }
    p { color: var(--muted); line-height: 1.7; margin-bottom: 8px; }
    .divider {
      border: none; border-top: 1px solid var(--border);
      margin: 28px 0;
    }
    .ref { font-size: 12px; color: var(--muted); font-family: monospace; }
    .btn {
      display: inline-block; margin-top: 28px;
      padding: 13px 32px; background: var(--gold);
      border-radius: 4px; color: #0d0d0d;
      font-family: 'Cinzel', serif; font-weight: 700;
      font-size: 0.85rem; letter-spacing: 0.08em;
      text-decoration: none; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    footer {
      border-top: 1px solid var(--border); padding: 32px 2rem;
      text-align: center; color: var(--muted); font-size: 13px;
    }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="/"><span>Christian</span>Goblin</a>
  </header>

  <main>
    <div class="card">
      <div class="check" id="statusIcon" aria-hidden="true">…</div>
      <h1 id="pageHeading">Verifying Order</h1>
      <p id="orderSummary">We are securely checking the checkout session before confirming your order.</p>
      <p id="serviceSummary">Your cart will remain unchanged until payment is verified.</p>
      <hr class="divider" />
      <p id="orderStatus" role="status" aria-live="polite">Verifying your checkout session…</p>
      <p class="ref" id="sessionRef"></p>
      <a class="btn" href="/store/">Back to Shop</a>
    </div>
  </main>

  <footer>
  <p>&copy; 2025 ChristianGoblin &nbsp;·&nbsp; <a href="/store/policies.html">Store Policies</a> &nbsp;·&nbsp; <a href="/privacy.html">Privacy</a> &nbsp;·&nbsp; <a href="/terms.html">Terms</a> &nbsp;·&nbsp; <a href="mailto:hello@christiangoblin.com">Contact</a></p>
</footer>

  <script>
    const WORKER = 'https://site.michaelthechristiangoblin.workers.dev';

    function money(cents, currency) {
      const n = Number(cents);
      if (!Number.isFinite(n)) return '';
      return new Intl.NumberFormat('en-US', { style: 'currency', currency: (currency || 'usd').toUpperCase() }).format(n / 100);
    }

    function setPageState({ heading, summary, detail, icon = '!', title = heading }) {
      document.getElementById('pageHeading').textContent = heading;
      document.getElementById('orderSummary').textContent = summary;
      document.getElementById('serviceSummary').textContent = detail;
      document.getElementById('statusIcon').textContent = icon;
      document.title = `${title} — Christian Goblin`;
    }

    function clearVerifiedCart() {
      try {
        localStorage.removeItem('cg_cart');
      } catch {
        // Storage can be unavailable in strict privacy modes. Payment is still valid.
      }
    }

    async function loadSession() {
      const params = new URLSearchParams(window.location.search);
      const sid = params.get('session_id');
      const ref = document.getElementById('sessionRef');
      const status = document.getElementById('orderStatus');

      if (!sid) {
        setPageState({
          heading: 'Checkout Not Verified',
          summary: 'No checkout reference was found.',
          detail: 'Your cart has not been changed. Return to the shop or contact support if you completed a payment.',
          icon: '!',
        });
        status.textContent = 'Missing checkout reference.';
        return;
      }

      ref.textContent = `Order ref: ${sid.slice(-12)}`;

      try {
        const res = await fetch(`${WORKER}/session?id=${encodeURIComponent(sid)}`, {
          headers: { Accept: 'application/json' },
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.session) throw new Error(data.error || 'Could not load session');

        const session = data.session;
        const paymentStatus = String(session.payment_status || '').toLowerCase();
        const checkoutStatus = String(session.status || '').toLowerCase();
        const amount = Number(session.amount_total);
        const total = Number.isFinite(amount) ? ` Total paid: ${money(amount, session.currency)}.` : '';
        const hasService = Number(session.service_count || 0) > 0;

        if (paymentStatus === 'paid' && checkoutStatus === 'complete') {
          clearVerifiedCart();
          setPageState({
            heading: 'Order Confirmed',
            summary: 'Your payment was verified successfully. Physical items will be prepared for shipment.',
            detail: hasService
              ? 'Your paid service request was received, and I will contact you using your checkout information.'
              : 'You will receive any available order updates through your checkout contact information.',
            icon: '✓',
          });
          status.textContent = `Payment verified.${total}`;
          return;
        }

        if (checkoutStatus === 'open' || paymentStatus === 'unpaid') {
          setPageState({
            heading: 'Payment Processing',
            summary: 'Stripe has not confirmed payment yet.',
            detail: 'Your cart has not been changed. Refresh this page after payment completes, or return to checkout.',
            icon: '…',
          });
          status.textContent = `Current payment status: ${paymentStatus || 'pending'}.`;
          return;
        }

        setPageState({
          heading: 'Payment Not Confirmed',
          summary: 'This checkout session is not marked as paid.',
          detail: 'Your cart has not been changed. Contact hello@christiangoblin.com if you believe payment completed.',
          icon: '!',
        });
        status.textContent = `Checkout status: ${checkoutStatus || 'unknown'}; payment status: ${paymentStatus || 'unknown'}.`;
      } catch (error) {
        console.error('Checkout verification failed:', error);
        setPageState({
          heading: 'Unable to Verify Payment',
          summary: 'The store could not securely verify this checkout session.',
          detail: 'Your cart has not been changed. Check your Stripe receipt or contact hello@christiangoblin.com before trying another payment.',
          icon: '!',
        });
        status.textContent = 'Payment verification is temporarily unavailable.';
      }
    }

    loadSession();
  </script>
</body>
</html>
