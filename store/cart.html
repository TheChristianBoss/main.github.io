<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — Christian Goblin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0d;
      --surface:  #161616;
      --border:   #2a2a2a;
      --text:     #e8e2d9;
      --muted:    #6b6560;
      --gold:     #c9a84c;
      --gold-dim: #8a6f2e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,13,13,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      color: var(--gold);
      text-decoration: none;
    }

    .logo span { color: var(--text); font-weight: 700; }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }

    .back-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* ── Layout ── */
    .cart-page {
      max-width: 900px;
      margin: 0 auto;
      padding: 64px 2rem;
    }

    .cart-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 900;
      margin-bottom: 8px;
    }

    .cart-subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 48px;
    }

    .cart-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 40px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .cart-layout { grid-template-columns: 1fr; }
      .cart-page { padding: 40px 1.5rem; }
    }

    /* ── Cart items ── */
    .cart-items { display: flex; flex-direction: column; gap: 0; }

    .cart-item {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
    }

    .cart-item:first-child { border-top: 1px solid var(--border); }

    .item-image {
      width: 80px;
      height: 80px;
      border-radius: 4px;
      overflow: hidden;
      background: var(--surface);
      flex-shrink: 0;
    }

    .item-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .item-info {}

    .item-name {
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .item-variant {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .item-qty {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .qty-btn {
      width: 28px;
      height: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: border-color 0.15s;
    }

    .qty-btn:hover { border-color: var(--gold-dim); }

    .qty-num {
      font-size: 14px;
      min-width: 20px;
      text-align: center;
    }

    .item-right { text-align: right; }

    .item-price {
      font-weight: 600;
      color: var(--gold);
      margin-bottom: 8px;
      white-space: nowrap;
    }

    .remove-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
      font-family: 'Inter', sans-serif;
      transition: color 0.15s;
    }

    .remove-btn:hover { color: #c0392b; }

    /* ── Summary ── */
    .summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px;
      position: sticky;
      top: 80px;
    }

    .summary-title {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .summary-row.total {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 1rem;
      font-weight: 600;
    }

    .summary-row.total .val { color: var(--gold); font-size: 1.15rem; }

    .summary-muted { color: var(--muted); font-size: 12px; margin-bottom: 20px; }

    .checkout-btn {
      width: 100%;
      padding: 15px;
      background: var(--gold);
      border: none;
      border-radius: 4px;
      color: #0d0d0d;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-bottom: 12px;
    }

    .checkout-btn:hover { opacity: 0.9; }
    .checkout-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .continue-link {
      display: block;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      text-decoration: none;
      transition: color 0.2s;
    }

    .continue-link:hover { color: var(--gold); }

    /* ── Empty state ── */
    .empty-cart {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 2rem;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .empty-cart h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      color: var(--text);
      margin-bottom: 8px;
    }

    .empty-cart p { margin-bottom: 24px; }

    .shop-link {
      display: inline-block;
      padding: 12px 28px;
      border: 1px solid var(--gold-dim);
      border-radius: 4px;
      color: var(--gold);
      text-decoration: none;
      font-size: 14px;
      transition: background 0.2s;
    }

    .shop-link:hover { background: rgba(201,168,76,0.08); }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 40px 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--gold); }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/"><span>Christian</span>Goblin</a>
  <a class="back-btn" href="/store/">← Keep Shopping</a>
</header>

<main class="cart-page">
  <h1 class="cart-title">Your Cart</h1>
  <p class="cart-subtitle" id="cartSubtitle"></p>
  <div class="cart-layout" id="cartLayout"></div>
</main>

<footer>
  <p>&copy; 2025 ChristianGoblin &nbsp;·&nbsp; <a href="mailto:hello@christiangoblin.com">Contact</a></p>
</footer>

<script>
  const WORKER = 'https://site.michaelthechristiangoblin.workers.dev';

  function esc(value) {
    return String(value ?? '').replace(/[&<>'"]/g, ch => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
    }[ch]));
  }

  function safeUrl(value) {
    try {
      const url = new URL(String(value || ''), window.location.origin);
      return url.protocol === 'https:' || url.origin === window.location.origin ? url.href : '';
    } catch { return ''; }
  }

  function money(value) {
    const n = Number.parseFloat(value);
    return Number.isFinite(n) ? n.toFixed(2) : '0.00';
  }

  function clampQty(value) {
    const n = Number.parseInt(value, 10);
    return Math.max(1, Math.min(10, Number.isFinite(n) ? n : 1));
  }

  function normalizeCart(cart) {
    const merged = new Map();
    for (const item of Array.isArray(cart) ? cart : []) {
      if (!item?.variant_id) continue;
      const key = String(item.variant_id);
      const existing = merged.get(key);
      const next = {
        product_id: item.product_id,
        product_name: String(item.product_name || 'Product'),
        variant_id: key,
        variant_name: String(item.variant_name || 'Default'),
        price: Number.parseFloat(item.price) || 0,
        image: safeUrl(item.image),
        quantity: clampQty(item.quantity),
      };
      if (existing) existing.quantity = clampQty(existing.quantity + next.quantity);
      else merged.set(key, next);
    }
    return [...merged.values()];
  }

  // ── Cart helpers ─────────────────────────────────────────────────────
  function getCart() {
    try { return normalizeCart(JSON.parse(localStorage.getItem('cg_cart') || '[]')); } catch { return []; }
  }

  function saveCart(cart) {
    localStorage.setItem('cg_cart', JSON.stringify(normalizeCart(cart)));
  }

  function updateQty(variantId, delta) {
    const cart = getCart();
    const item = cart.find(i => String(i.variant_id) === String(variantId));
    if (!item) return;
    item.quantity = clampQty(item.quantity + delta);
    saveCart(cart);
    renderCart();
  }

  function removeItem(variantId) {
    saveCart(getCart().filter(i => String(i.variant_id) !== String(variantId)));
    renderCart();
  }

  function checkoutPayload() {
    return {
      items: getCart().map(({ variant_id, quantity }) => ({
        variant_id,
        quantity: clampQty(quantity),
      })),
    };
  }

  // ── Render ───────────────────────────────────────────────────────────
  function renderCart() {
    const cart = getCart();
    saveCart(cart);
    const layout = document.getElementById('cartLayout');
    const subtitle = document.getElementById('cartSubtitle');

    if (!cart.length) {
      subtitle.textContent = '';
      layout.innerHTML = `
        <div class="empty-cart">
          <div class="empty-icon">🛒</div>
          <h2>Your cart is empty</h2>
          <p>Add something from the shop to get started.</p>
          <a class="shop-link" href="/store/">Browse the Shop</a>
        </div>
      `;
      return;
    }

    const total = cart.reduce((sum, i) => sum + i.price * i.quantity, 0);
    const itemCount = cart.reduce((sum, i) => sum + i.quantity, 0);
    subtitle.textContent = `${itemCount} item${itemCount !== 1 ? 's' : ''}`;

    layout.innerHTML = `
      <div class="cart-items">
        ${cart.map(item => `
          <div class="cart-item" data-variant="${esc(item.variant_id)}">
            <div class="item-image">
              <img src="${esc(safeUrl(item.image))}" alt="${esc(item.product_name)}" loading="lazy" />
            </div>
            <div class="item-info">
              <div class="item-name">${esc(item.product_name)}</div>
              <div class="item-variant">${esc(item.variant_name)}</div>
              <div class="item-qty">
                <button class="qty-btn" data-action="minus" data-variant="${esc(item.variant_id)}">−</button>
                <span class="qty-num">${item.quantity}</span>
                <button class="qty-btn" data-action="plus" data-variant="${esc(item.variant_id)}">+</button>
              </div>
            </div>
            <div class="item-right">
              <div class="item-price">$${money(item.price * item.quantity)}</div>
              <button class="remove-btn" data-remove="${esc(item.variant_id)}">Remove</button>
            </div>
          </div>
        `).join('')}
      </div>

      <div class="summary">
        <div class="summary-title">Order Summary</div>

        ${cart.map(item => `
          <div class="summary-row">
            <span>${esc(item.product_name)} <span style="color:var(--muted)">×${item.quantity}</span></span>
            <span class="val">$${money(item.price * item.quantity)}</span>
          </div>
        `).join('')}

        <div class="summary-row total">
          <span>Estimated total</span>
          <span class="val">$${money(total)}</span>
        </div>

        <p class="summary-muted">Final item prices and shipping are verified securely at checkout.</p>

        <button class="checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
        <a class="continue-link" href="/store/">Continue Shopping</a>
      </div>
    `;

    document.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        const delta = btn.dataset.action === 'plus' ? 1 : -1;
        updateQty(btn.dataset.variant, delta);
      });
    });

    document.querySelectorAll('[data-remove]').forEach(btn => {
      btn.addEventListener('click', () => removeItem(btn.dataset.remove));
    });

    document.getElementById('checkoutBtn').addEventListener('click', async () => {
      const btn = document.getElementById('checkoutBtn');
      btn.disabled = true;
      btn.textContent = 'Verifying cart…';

      try {
        const res = await fetch(`${WORKER}/checkout`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(checkoutPayload()),
        });

        const data = await res.json();

        if (data.url) {
          window.location.href = data.url;
        } else {
          throw new Error(data.error || data.details || 'No checkout URL returned');
        }
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Proceed to Checkout';
        alert('Checkout failed: ' + err.message + '\n\nYour cart may include an unavailable product or variant.');
      }
    });
  }

  renderCart();
</script>
</body>
</html>
