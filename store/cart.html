<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — Christian Goblin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0d;
      --surface:  #161616;
      --border:   #2a2a2a;
      --text:     #e8e2d9;
      --muted:    #6b6560;
      --gold:     #c9a84c;
      --gold-dim: #8a6f2e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,13,13,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      color: var(--gold);
      text-decoration: none;
    }

    .logo span { color: var(--text); font-weight: 700; }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }

    .back-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* ── Layout ── */
    .cart-page {
      max-width: 900px;
      margin: 0 auto;
      padding: 64px 2rem;
    }

    .cart-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 900;
      margin-bottom: 8px;
    }

    .cart-subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 48px;
    }

    .cart-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 40px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .cart-layout { grid-template-columns: 1fr; }
      .cart-page { padding: 40px 1.5rem; }
    }

    /* ── Cart items ── */
    .cart-items { display: flex; flex-direction: column; gap: 0; }

    .cart-item {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
    }

    .cart-item:first-child { border-top: 1px solid var(--border); }

    .item-image {
      width: 80px;
      height: 80px;
      border-radius: 4px;
      overflow: hidden;
      background: var(--surface);
      flex-shrink: 0;
    }

    .item-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .item-image.service {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold);
      border: 1px solid var(--border);
      font-family: 'Cinzel', serif;
      font-size: 11px;
      text-align: center;
      line-height: 1.2;
      background: radial-gradient(circle at 20% 10%, rgba(201,168,76,0.18), transparent 35%), linear-gradient(135deg, rgba(139,26,26,0.18), rgba(201,168,76,0.08));
    }

    .item-info {}

    .item-name {
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .item-variant {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .item-qty {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .qty-btn {
      width: 28px;
      height: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: border-color 0.15s;
    }

    .qty-btn:hover { border-color: var(--gold-dim); }

    .qty-num {
      font-size: 14px;
      min-width: 20px;
      text-align: center;
    }

    .item-right { text-align: right; }

    .item-price {
      font-weight: 600;
      color: var(--gold);
      margin-bottom: 8px;
      white-space: nowrap;
    }

    .remove-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
      font-family: 'Inter', sans-serif;
      transition: color 0.15s;
    }

    .remove-btn:hover { color: #c0392b; }

    /* ── Summary ── */
    .summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px;
      position: sticky;
      top: 80px;
    }

    .summary-title {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .summary-row.total {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 1rem;
      font-weight: 600;
    }

    .summary-row.total .val { color: var(--gold); font-size: 1.15rem; }

    .summary-muted { color: var(--muted); font-size: 12px; margin-bottom: 20px; }



    .checkout-field { margin: 18px 0 16px; }
    .checkout-label {
      display: block;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 8px;
    }
    .checkout-input {
      width: 100%;
      background: #101010;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      padding: 11px 12px;
      font: inherit;
      outline: none;
    }
    .checkout-input:focus { border-color: var(--gold-dim); }
    .checkout-error {
      display: none;
      margin: 12px 0;
      border: 1px solid rgba(192,57,43,0.35);
      background: rgba(192,57,43,0.08);
      color: #d9a8a0;
      border-radius: 4px;
      padding: 12px;
      font-size: 13px;
      line-height: 1.5;
    }
    .checkout-error.show { display: block; }
    .summary-list {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
      margin: 12px 0 20px;
      padding-left: 18px;
    }

    .checkout-btn {
      width: 100%;
      padding: 15px;
      background: var(--gold);
      border: none;
      border-radius: 4px;
      color: #0d0d0d;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-bottom: 12px;
    }

    .checkout-btn:hover { opacity: 0.9; }
    .checkout-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .continue-link {
      display: block;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      text-decoration: none;
      transition: color 0.2s;
    }

    .continue-link:hover { color: var(--gold); }

    .clear-cart-btn {
      display: block;
      margin: 12px auto 0;
      background: none;
      border: none;
      color: var(--muted);
      font: inherit;
      font-size: 12px;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .clear-cart-btn:hover { color: #c0392b; }

    .cart-notice {
      grid-column: 1 / -1;
      border: 1px solid rgba(201,168,76,0.3);
      background: rgba(201,168,76,0.08);
      color: var(--text);
      border-radius: 6px;
      padding: 12px 14px;
      font-size: 13px;
      margin-bottom: 18px;
    }

    .service-edit-link {
      color: var(--gold);
      text-decoration: none;
      font-size: 12px;
    }

    .service-edit-link:hover { text-decoration: underline; }

    /* ── Empty state ── */
    .empty-cart {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 2rem;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .empty-cart h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      color: var(--text);
      margin-bottom: 8px;
    }

    .empty-cart p { margin-bottom: 24px; }

    .shop-link {
      display: inline-block;
      padding: 12px 28px;
      border: 1px solid var(--gold-dim);
      border-radius: 4px;
      color: var(--gold);
      text-decoration: none;
      font-size: 14px;
      transition: background 0.2s;
    }

    .shop-link:hover { background: rgba(201,168,76,0.08); }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 40px 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--gold); }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/"><span>Christian</span>Goblin</a>
  <a class="back-btn" href="/store/">← Keep Shopping</a>
</header>

<main class="cart-page">
  <h1 class="cart-title">Your Cart</h1>
  <p class="cart-subtitle" id="cartSubtitle"></p>
  <div class="cart-layout" id="cartLayout"></div>
</main>

<footer>
  <p>&copy; 2026 ChristianGoblin &nbsp;·&nbsp; <a href="/store/policies.html">Store Policies</a> &nbsp;·&nbsp; <a href="/privacy.html">Privacy</a> &nbsp;·&nbsp; <a href="/terms.html">Terms</a> &nbsp;·&nbsp; <a href="mailto:hello@christiangoblin.com">Contact</a></p>
</footer>

<script>
  const WORKER = 'https://site.michaelthechristiangoblin.workers.dev';
  const SERVICE_CATALOG = {
    'cyber-security-evaluation': { name: 'Cyber Security Evaluation', price_cents: 4000, max_qty: 1 },
    'custom-portfolio-website': { name: 'Custom Portfolio Website', price_cents: 4000, max_qty: 1 },
    'custom-domain-one-year': { name: 'Custom Domain — 1 Year', price_cents: 1200, max_qty: 1 },
    'three-month-life-coaching': { name: '3 Month Life Coaching', price_cents: 11200, max_qty: 1 },
  };
  let cartNotice = '';

  function esc(value) { return String(value ?? '').replace(/[&<>'"]/g, ch => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' }[ch])); }
  function safeUrl(value) { try { const url = new URL(String(value || ''), window.location.origin); return url.protocol === 'https:' || url.origin === window.location.origin ? url.href : ''; } catch { return ''; } }
  function money(value) { const n = Number.parseFloat(value); return Number.isFinite(n) ? n.toFixed(2) : '0.00'; }
  function centsToDollars(cents) { const n = Number.parseInt(cents,10); return Number.isFinite(n) ? (n/100).toFixed(2) : '0.00'; }
  function clampQty(value, max = 10) { const n = Number.parseInt(value,10); return Math.max(1, Math.min(max, Number.isFinite(n) ? n : 1)); }

  function itemKey(item) { return item.type === 'service' ? `service:${item.service_id}` : `physical:${item.variant_id}`; }
  function itemPrice(item) { return item.type === 'service' ? (Number(item.price_cents) || 0) / 100 : Number.parseFloat(item.price) || 0; }
  function itemName(item) { return item.type === 'service' ? item.service_name : item.product_name; }
  function itemVariant(item) { return item.type === 'service' ? 'Service request' : item.variant_name; }
  function maxQty(item) { return item.type === 'service' ? (SERVICE_CATALOG[item.service_id]?.max_qty || 1) : 10; }

  function normalizeCart(cart) {
    const merged = new Map();
    let removedStaleService = false;
    for (const item of Array.isArray(cart) ? cart : []) {
      if (item?.type === 'service') {
        const id = String(item.service_id || '').toLowerCase().replace(/[^a-z0-9-]/g, '');
        const service = SERVICE_CATALOG[id];
        if (!id || !service) { removedStaleService = true; continue; }
        const key = `service:${id}`;
        merged.set(key, {
          type: 'service',
          service_id: id,
          service_name: service.name,
          price_cents: Number.parseInt(service.price_cents, 10) || 0,
          quantity: clampQty(item.quantity, service.max_qty || 1),
          notes: String(item.notes || '').slice(0, 700),
          deadline: String(item.deadline || '').slice(0, 120),
          contact_preference: String(item.contact_preference || '').slice(0, 80),
        });
        continue;
      }
      if (!item?.variant_id) continue;
      const key = `physical:${String(item.variant_id)}`;
      const existing = merged.get(key);
      const next = {
        type: 'physical',
        product_id: item.product_id,
        product_name: String(item.product_name || 'Product'),
        variant_id: String(item.variant_id),
        variant_name: String(item.variant_name || 'Default'),
        price: Number.parseFloat(item.price) || 0,
        image: safeUrl(item.image),
        quantity: clampQty(item.quantity, 10),
      };
      if (existing) existing.quantity = clampQty(existing.quantity + next.quantity, 10);
      else merged.set(key, next);
    }
    if (removedStaleService) cartNotice = 'An outdated service item was removed from your cart. Please add the current service again from the store if needed.';
    return [...merged.values()];
  }

  function getCart() { try { return normalizeCart(JSON.parse(localStorage.getItem('cg_cart') || '[]')); } catch { cartNotice = 'Your saved cart could not be read, so it was reset.'; return []; } }
  function saveCart(cart) { localStorage.setItem('cg_cart', JSON.stringify(normalizeCart(cart))); }

  function updateQty(key, delta) {
    const cart = getCart();
    const item = cart.find(i => itemKey(i) === key);
    if (!item) return;
    item.quantity = clampQty(item.quantity + delta, maxQty(item));
    saveCart(cart);
    renderCart();
  }

  function removeItem(key) { saveCart(getCart().filter(i => itemKey(i) !== key)); renderCart(); }
  function clearCart() { localStorage.removeItem('cg_cart'); cartNotice = ''; renderCart(); }

  function checkoutPayload() {
    const email = document.getElementById('customerEmail')?.value?.trim();
    const payload = {
      items: getCart().map((item) => item.type === 'service'
        ? {
            type: 'service',
            id: item.service_id,
            quantity: clampQty(item.quantity, maxQty(item)),
            notes: item.notes,
            deadline: item.deadline,
            contact_preference: item.contact_preference,
          }
        : {
            type: 'physical',
            variant_id: item.variant_id,
            quantity: clampQty(item.quantity, 10),
          }),
    };
    if (email) payload.customer_email = email;
    return payload;
  }

  // ── Render ───────────────────────────────────────────────────────────
  function renderCart() {
    const cart = getCart();
    saveCart(cart);
    const layout = document.getElementById('cartLayout');
    const subtitle = document.getElementById('cartSubtitle');

    if (!cart.length) {
      subtitle.textContent = '';
      layout.innerHTML = `
        <div class="empty-cart">
          <div class="empty-icon">🛒</div>
          <h2>Your cart is empty</h2>
          <p>Add merch or a service request from the store to get started.</p>
          <a class="shop-link" href="/store/">Browse the Store</a>
        </div>`;
      return;
    }

    const total = cart.reduce((sum, i) => sum + itemPrice(i) * i.quantity, 0);
    const itemCount = cart.reduce((sum, i) => sum + i.quantity, 0);
    const hasPhysical = cart.some(i => i.type !== 'service');
    const hasService = cart.some(i => i.type === 'service');
    subtitle.textContent = `${itemCount} item${itemCount !== 1 ? 's' : ''}`;

    layout.innerHTML = `
      ${cartNotice ? `<div class="cart-notice">${esc(cartNotice)}</div>` : ''}
      <div class="cart-items">
        ${cart.map(item => {
          const key = itemKey(item);
          const isService = item.type === 'service';
          return `
            <div class="cart-item" data-key="${esc(key)}">
              <div class="item-image ${isService ? 'service' : ''}">
                ${isService ? 'SERVICE' : `<img src="${esc(safeUrl(item.image))}" alt="${esc(itemName(item))}" loading="lazy" />`}
              </div>
              <div class="item-info">
                <div class="item-name">${esc(itemName(item))}</div>
                <div class="item-variant">${esc(itemVariant(item))}</div>
                ${isService && item.notes ? `<div class="item-variant">${esc(item.notes)}</div>` : ''}
                ${isService && item.deadline ? `<div class="item-variant">Deadline: ${esc(item.deadline)}</div>` : ''}
                <div class="item-qty">
                  ${isService ? `<span class="qty-num">Qty ${item.quantity}</span> <a class="service-edit-link" href="/store/service.html?id=${encodeURIComponent(item.service_id)}">Edit request</a>` : `
                    <button class="qty-btn" data-action="minus" data-key="${esc(key)}">−</button>
                    <span class="qty-num">${item.quantity}</span>
                    <button class="qty-btn" data-action="plus" data-key="${esc(key)}">+</button>
                  `}
                </div>
              </div>
              <div class="item-right">
                <div class="item-price">$${money(itemPrice(item) * item.quantity)}</div>
                <button class="remove-btn" data-remove="${esc(key)}">Remove</button>
              </div>
            </div>`;
        }).join('')}
      </div>

      <div class="summary">
        <div class="summary-title">Order Summary</div>
        ${cart.map(item => `
          <div class="summary-row">
            <span>${esc(itemName(item))} <span style="color:var(--muted)">×${item.quantity}</span></span>
            <span class="val">$${money(itemPrice(item) * item.quantity)}</span>
          </div>`).join('')}
        <div class="summary-row total"><span>Estimated total</span><span class="val">$${money(total)}</span></div>
        <p class="summary-muted">Final prices are verified securely at checkout. ${hasPhysical ? 'Shipping and taxes are calculated during checkout.' : ''}</p>
        <ul class="summary-list">
          <li>Secure payment through Stripe.</li>
          <li>See <a href="/privacy.html">Privacy</a>, <a href="/terms.html">Terms</a>, and <a href="/store/policies.html">Store Policies</a>.</li>
          ${hasPhysical ? '<li>Physical shop items are prepared and shipped after checkout.</li>' : ''}
          ${hasService ? '<li>Service requests are sent to me after payment so I can contact you.</li><li>Each service request is kept to one per checkout line so the details stay clear.</li>' : ''}
          ${hasPhysical ? '<li>Quantity is limited to 10 per physical item.</li>' : ''}
        </ul>
        <div class="checkout-field">
          <label class="checkout-label" for="customerEmail">Email for checkout autofill</label>
          <input class="checkout-input" id="customerEmail" type="email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="checkout-error" id="checkoutError" role="alert"></div>
        <button class="checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
        <a class="continue-link" href="/store/">Continue Shopping</a>
        <a class="continue-link" href="/store/policies.html">Store Policies</a>
        <a class="continue-link" href="/privacy.html">Privacy</a>
        <a class="continue-link" href="/terms.html">Terms</a>
        <button class="clear-cart-btn" id="clearCartBtn" type="button">Clear Cart</button>
      </div>`;

    document.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', () => updateQty(btn.dataset.key, btn.dataset.action === 'plus' ? 1 : -1));
    });
    document.querySelectorAll('[data-remove]').forEach(btn => {
      btn.addEventListener('click', () => removeItem(btn.dataset.remove));
    });
    document.getElementById('clearCartBtn')?.addEventListener('click', clearCart);
    document.getElementById('checkoutBtn').addEventListener('click', async () => {
      const btn = document.getElementById('checkoutBtn');
      btn.disabled = true;
      btn.textContent = 'Verifying cart…';
      try {
        const errorBox = document.getElementById('checkoutError');
        errorBox.textContent = '';
        errorBox.classList.remove('show');
        const email = document.getElementById('customerEmail')?.value?.trim();
        if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          throw new Error('Please enter a valid email address or leave the email field blank.');
        }
        const res = await fetch(`${WORKER}/checkout`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(checkoutPayload()),
        });
        const data = await res.json();
        if (data.url) window.location.href = data.url;
        else throw new Error(data.error || data.details || 'No checkout URL returned');
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Proceed to Checkout';
        const box = document.getElementById('checkoutError');
        box.textContent = 'Checkout failed: ' + err.message;
        box.classList.add('show');
      }
    });
  }
  renderCart();
</script>
</body>
</html>
